<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marriott Shuttle Bus Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --m-black: #000000;
            --m-gold: #fff3b0;
            --m-white: #ffffff;
            --m-red: #e0001a;
            --m-gold-light: rgba(255, 255, 0, 0.6);
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--m-white);
            font-family: "Effra", "Noto Sans JP", sans-serif;
            overflow-x: hidden;
        }

        /* --- 管理画面 --- */
        .admin-container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--m-gold); padding-bottom: 15px; margin-bottom: 20px; }
        button { background: var(--m-gold); color: black; border: none; padding: 10px 25px; font-weight: bold; cursor: pointer; border-radius: 50px; }
        .next-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .info-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border-left: 6px solid var(--m-gold); text-align: center; }
        .time-val { font-size: 3rem; font-weight: bold; margin: 5px 0; }
        .schedule-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .day-group { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; }
        textarea { width: 100%; height: 100px; background: #2a2a2a; color: #ddd; border: 1px solid #444; border-radius: 8px; padding: 8px; margin: 5px 0 15px; box-sizing: border-box; }

        /* --- 全画面表示 --- */
        #fullscreen-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--m-black);
            z-index: 3000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-align: center;
        }
        .fs-label { font-size: 12vw; font-weight: bold;color: var(--m-gold);   margin: 0;line-height: 1;letter-spacing: -0.02em;
                    }
        .fs-next-time { font-size: 22vw; font-weight: bold; line-height: 0.8; margin: 2vh 0; }
        .fs-eta { font-size: 8vw; color: var(--m-gold);font-weight: bold;  margin-top: 2vh; }
        .fs-eta .num { color: var(--m-white); font-weight: bold;font-weight: bold; }
        .fs-footer { position: absolute; bottom: 4vh; left: 4vw; display: flex; align-items: center; gap: 25px; }
        .fs-logo { width: 150px; height: auto; filter: invert(15%) sepia(95%) saturate(6932%) hue-rotate(354deg) brightness(92%) contrast(121%); opacity: 0.9; }
        .fs-clock { font-size: 2.2vw; opacity: 0.6; font-weight: 300; }

        /* --- 時刻表オーバーレイ --- */
        #schedule-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(20px);
            z-index: 3100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5vh 5vw;
            box-sizing: border-box;
        }
        .overlay-title { font-size: 4vw; font-weight: bold; color: var(--m-gold); margin-bottom: 4vh; letter-spacing: 0.05em; }
        .tile-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); justify-content: center; align-content: center; gap: 25px; width: 100%; max-width: 1200px; }
        .tile { padding: 25px 10px; border: 2px solid var(--m-gold); text-align: center; font-size: 2.2rem; font-weight: bold; border-radius: 100px; color: var(--m-white); }
        .tile.passed { opacity: 0.15; border-color: #444; }

        #pip-canvas { display: none; }
        #pip-video { display: none; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="top-nav">
        <h1>Shuttle Bus Dashboard</h1>
        <div style="display:flex; gap:15px; align-items:center;">
            <div style="background:rgba(255,255,255,0.1); padding:5px 15px; border-radius:20px;">
                <label>祝日モード</label>
                <input type="checkbox" id="isHoliday">
            </div>
            <button onclick="startPiP()">最前面表示</button>
            <button onclick="enterFullScreen()">全画面表示</button>
        </div>
    </div>
    <div class="next-info-grid">
        <div class="info-card"><h2>ホテル発 (Hotel)</h2><div id="adm-h-time" class="time-val">--:--</div></div>
        <div class="info-card"><h2>品川駅発 (Shinagawa)</h2><div id="adm-s-time" class="time-val">--:--</div></div>
    </div>
    <div class="schedule-section">
        <div class="day-group">
            <h3>【平日】</h3>
            <label>ホテル発</label>
            <textarea id="h_wkday">07:57, 08:11, 08:25, 08:40, 08:55, 09:11, 09:28, 09:46, 10:20, 10:54, 11:28, 12:02, 12:36, 13:10, 13:44, 14:18, 14:52, 15:26, 16:00, 16:34, 17:06, 17:37, 18:08, 18:39, 19:10</textarea>
            <label>品川駅発</label>
            <textarea id="s_wkday">07:54, 08:08, 08:22, 08:36, 08:51, 09:07, 09:23, 09:39, 09:56, 10:14, 10:48, 11:22, 11:56, 12:30, 13:04, 13:48, 14:12, 14:46, 15:20, 15:54, 16:27, 17:00, 17:32, 18:03, 18:34, 19:06</textarea>
        </div>
        <div class="day-group">
            <h3>【土日祝】</h3>
            <label>ホテル発</label>
            <textarea id="h_weekend">09:01, 09:33, 10:06, 10:40, 11:14, 11:48, 12:22, 12:56, 13:30, 14:04, 14:38, 15:12, 15:46, 16:20, 16:54, 17:28, 18:02, 18:36, 19:10</textarea>
            <label>品川駅発</label>
            <textarea id="s_weekend">09:27, 10:00, 10:34, 11:08, 11:42, 12:16, 12:50, 13:24, 13:58, 14:32, 15:06, 15:40, 16:14, 16:48, 17:22, 17:56, 18:31, 19:06</textarea>
        </div>
    </div>
</div>

<div id="fullscreen-view" ondblclick="exitFullScreen()">
    <p class="fs-label">Next Shuttle Bus</p>
    <h1 id="fs-time" class="fs-next-time">--:--</h1>
    <div id="fs-eta" class="fs-eta"></div>
    <div class="fs-footer">
        <img src="https://shop.marriott.com/on/demandware.static/Sites-MBB-US-Site/-/default/dwd2983f65/images/brand/marriott.svg" alt="Marriott Logo" class="fs-logo">
        <div id="fs-clock" class="fs-clock">00:00:00</div>
    </div>
    <div id="schedule-overlay">
        <div class="overlay-title">Today's Timetable</div>
        <div id="tile-list" class="tile-container"></div>
    </div>
</div>

<canvas id="pip-canvas" width="400" height="250"></canvas>
<video id="pip-video" autoplay playsinline muted></video>

<script>
    function getTimes(id) {
        return document.getElementById(id).value.split(',').map(s => s.trim()).filter(s => s !== "");
    }

    // カウントダウン文字列生成（単位切り替え対応）
    function getCountdownText(diffMin, isHtml = false) {
        if (diffMin === null) return "";
        let text = "";
        if (diffMin >= 60) {
            const hrs = Math.floor(diffMin / 60);
            const mins = diffMin % 60;
            const hUnit = hrs === 1 ? "hr" : "hrs";
            const mUnit = mins === 1 ? "min" : "mins";
            text = isHtml ? `<span class="num">${hrs}</span> ${hUnit} <span class="num">${mins}</span> ${mUnit}` : `${hrs}${hUnit} ${mins}${mUnit}`;
        } else {
            const mUnit = diffMin === 1 ? "min" : "mins";
            text = isHtml ? `<span class="num">${diffMin}</span> ${mUnit}` : `${diffMin}${mUnit}`;
        }
        return isHtml ? `in ${text}` : text;
    }

    function findNext(times) {
        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();
        const next = times.find(t => {
            const [h, m] = t.split(':').map(Number);
            return (h * 60 + m) > nowMin;
        });
        if (!next) return { time: "End of Service", eta: null };
        const [nh, nm] = next.split(':').map(Number);
        return { time: next, eta: (nh * 60 + nm) - nowMin };
    }

    function update() {
        const now = new Date();
        const isWeekend = (now.getDay() === 0 || now.getDay() === 6 || document.getElementById('isHoliday').checked);
        const hTimes = isWeekend ? getTimes('h_weekend') : getTimes('h_wkday');
        const sTimes = isWeekend ? getTimes('s_weekend') : getTimes('s_wkday');
        const nH = findNext(hTimes);
        const nS = findNext(sTimes);

        document.getElementById('adm-h-time').innerText = nH.time;
        document.getElementById('adm-s-time').innerText = nS.time;
        document.getElementById('fs-time').innerText = nH.time;
        document.getElementById('fs-eta').innerHTML = nH.eta !== null ? getCountdownText(nH.eta, true) : "";
        document.getElementById('fs-clock').innerText = now.toLocaleTimeString('ja-JP', { hour12: false });

        updatePiP(nH.time, nH.eta);
    }

    function enterFullScreen() {
        const el = document.getElementById('fullscreen-view');
        el.style.display = 'flex';
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }

    function exitFullScreen() {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        document.getElementById('fullscreen-view').style.display = 'none';
    }

    document.getElementById('fullscreen-view').addEventListener('click', (e) => {
        const overlay = document.getElementById('schedule-overlay');
        const list = document.getElementById('tile-list');
        if (overlay.style.display === 'flex') { overlay.style.display = 'none'; return; }
        list.innerHTML = '';
        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();
        const isWeekend = (now.getDay() === 0 || now.getDay() === 6 || document.getElementById('isHoliday').checked);
        const hTimes = isWeekend ? getTimes('h_weekend') : getTimes('h_wkday');
        hTimes.forEach(t => {
            const [h, m] = t.split(':').map(Number);
            const div = document.createElement('div');
            div.className = `tile ${(h * 60 + m) <= nowMin ? 'passed' : ''}`;
            div.innerText = t;
            list.appendChild(div);
        });
        overlay.style.display = 'flex';
        e.stopPropagation();
    });

    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) document.getElementById('fullscreen-view').style.display = 'none';
    });

    async function startPiP() {
        const video = document.getElementById('pip-video');
        const canvas = document.getElementById('pip-canvas');
        video.srcObject = canvas.captureStream();
        await video.play();
        await video.requestPictureInPicture();
    }

    function updatePiP(time, eta) {
        const canvas = document.getElementById('pip-canvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#b4975a";
        ctx.font = "bold 90px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(time, 200, 110);
        ctx.fillStyle = "white";
        ctx.font = "40px sans-serif";
        // PiP用にも単位切り替えロジックを適用
        ctx.fillText(eta !== null ? getCountdownText(eta, false) : "", 200, 190);
    }

    setInterval(update, 1000);
    window.onload = update;
</script>
</body>
</html>
